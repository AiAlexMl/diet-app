# פינג שבועי ל-Supabase — ה-free tier מושהה אחרי שבוע ללא פעילות.
# Secrets נדרשים (Settings → Secrets → Actions): SUPABASE_URL, SUPABASE_ANON_KEY.
name: supabase-keepalive
on:
  schedule:
    - cron: '17 6 * * 1,4'   # פעמיים בשבוע (ב' וה' 06:17 UTC) — מרווח בטוח מתחת לשבוע
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP $code"
          # 200 = חי; 401/404 לא אמורים לקרות עם anon key תקין על טבלה קיימת
          [ "$code" = "200" ]
