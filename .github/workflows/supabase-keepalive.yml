# פינג ל-Supabase — ה-free tier מושהה אחרי שבוע ללא פעילות.
# הערכים כאן ציבוריים בכוונה: אותו URL + anon key שכבר גלויים ב-supabase-client.js
# (ההגנה היא RLS, לא סודיות המפתח). לכן אין secrets — ה-workflow עצמאי ורץ מיד.
# המפתח הסודי (service_role) לעולם לא כאן.
name: supabase-keepalive
on:
  schedule:
    # יומי, לא פעמיים בשבוע: ב-21/07/2026 הגיע מייל אזהרת השהיה מ-Supabase למרות
    # שכל ההרצות הצליחו (HTTP 200, מרווחים של 3-4 ימים). הנוסח שם היה "not seen
    # sufficient activity", כלומר ייתכן שנפח הפעילות נמדד ולא עצם קיומה. הרצה יומית
    # מבטלת את חלון ארבעת הימים ועולה ~6 שניות ריצה. אם תגיע אזהרה נוספת גם ככה,
    # הצעד הבא הוא פנייה לתמיכה או Pro — לא נתונים פיקטיביים (מזהמים אנליטיקס/RLS).
    - cron: '17 6 * * *'   # כל יום 06:17 UTC

  workflow_dispatch:

env:
  SUPABASE_URL: https://kjlxgamalfzdjtjxfzun.supabase.co
  SUPABASE_ANON_KEY: sb_publishable_cUbB5SU30DWzSdFmP2T24w_lc4PjF9f

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "HTTP $code"
          # 200 = חי; 401/404 לא אמורים לקרות עם anon key תקין על טבלה קיימת
          [ "$code" = "200" ]
