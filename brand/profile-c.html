<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin:0; padding:0; }
  body { width:1024px; height:1024px; overflow:hidden; }
  .bg {
    width:1024px; height:1024px;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    display:flex; align-items:center; justify-content:center;
    font-family:'Segoe UI', Arial, sans-serif;
  }
  .plate {
    width:640px; height:640px; border-radius:50%;
    border:30px solid #ffffff;
    display:flex; align-items:center; justify-content:center;
    box-shadow: inset 0 0 0 26px transparent;
  }
  .inner {
    width:500px; height:500px; border-radius:50%;
    border:10px solid rgba(255,255,255,0.45);
    display:flex; align-items:center; justify-content:center;
  }
  .s { color:#fff; font-size:360px; font-weight:800; line-height:1; transform:translateY(-12px); }
</style></head>
<body>
  <div class="bg">
    <div class="plate"><div class="inner"><div class="s">S</div></div></div>
  </div>
</body></html>
