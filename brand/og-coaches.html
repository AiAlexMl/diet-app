<!DOCTYPE html>
<!-- באנר שיתוף (Open Graph) 1200x630 לדף המאמנים. פתח → צלם את הכרטיס → שמור כ-og-coaches.png באותה תיקייה. -->
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{display:flex;align-items:center;justify-content:center;background:#333;font-family:'Heebo',sans-serif}
  /* הכרטיס — בדיוק 1200x630 */
  .og{
    width:1200px;height:630px;flex:0 0 auto;position:relative;overflow:hidden;
    background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);
    color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  }
  /* קישוטי רקע */
  .og::before,.og::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.07)}
  .og::before{width:520px;height:520px;top:-160px;left:-120px}
  .og::after{width:420px;height:420px;bottom:-180px;right:-100px}
  .inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:0 70px}
  .logo-mark{width:128px;height:128px;border-radius:30px;background:#fff;display:flex;align-items:center;justify-content:center;
    box-shadow:0 18px 50px rgba(0,0,0,.22);margin-bottom:30px;overflow:hidden}
  .logo-mark img{width:128px;height:128px;object-fit:cover}
  .wordmark{font-size:60px;font-weight:900;letter-spacing:-1px;margin-bottom:10px}
  .wordmark .tag{font-weight:700;opacity:.9}
  .headline{font-size:64px;font-weight:900;letter-spacing:-1.5px;line-height:1.1;margin-bottom:20px}
  .headline .l2{display:block;opacity:.92}
  .sub{font-size:30px;font-weight:500;opacity:.92;max-width:900px;line-height:1.4}
  .url{position:absolute;bottom:34px;font-size:24px;font-weight:700;opacity:.9;letter-spacing:.5px}
</style>
</head>
<body>
  <div class="og">
    <div class="inner">
      <div class="logo-mark"><img src="AVATAR-shapeat.png" alt="ShapEat"></div>
      <div class="wordmark">ShapEat <span class="tag">· למאמנים</span></div>
      <div class="headline">האפליקציה שלך.<span class="l2">המתאמנים שלך.</span></div>
      <div class="sub">תזונה אישית ממותגת בשמך — בלי לבנות תפריטים.</div>
    </div>
    <div class="url">shapeat.co.il/coaches</div>
  </div>
</body>
</html>
