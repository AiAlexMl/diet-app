<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin:0; padding:0; }
  body { width:1024px; height:1024px; overflow:hidden; }
  .bg {
    width:1024px; height:1024px;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:50px;
    font-family:'Segoe UI', Arial, sans-serif;
  }
  .name { color:#fff; font-size:140px; font-weight:800; letter-spacing:-3px; }
  .name .eat { color:#a7f3d0; }
</style></head>
<body>
  <div class="bg">
    <!-- B1: איקס קלאסי — משקולת מלאה (לבן) × מזלג (מנטה) -->
    <svg width="560" height="560" viewBox="0 0 600 600">
      <!-- משקולת שלמה וסימטרית ב-45 מעלות -->
      <g fill="#ffffff" transform="rotate(45 300 300)">
        <rect x="166" y="283" width="268" height="34" rx="17"/>
        <rect x="118" y="205" width="46" height="190" rx="23"/>
        <rect x="72"  y="240" width="38" height="120" rx="19"/>
        <rect x="436" y="205" width="46" height="190" rx="23"/>
        <rect x="490" y="240" width="38" height="120" rx="19"/>
      </g>
      <!-- מזלג קלאסי אנכי ב-45+ מעלות (ניצב למשקולת — איקס), שכבה עליונה -->
      <g fill="#a7f3d0" transform="rotate(45 300 300)">
        <rect x="251" y="118" width="18" height="100" rx="9"/>
        <rect x="283" y="118" width="18" height="100" rx="9"/>
        <rect x="315" y="118" width="18" height="100" rx="9"/>
        <rect x="347" y="118" width="18" height="100" rx="9"/>
        <path d="M251 200 h114 a0 0 0 0 1 0 0 v30 a57 44 0 0 1 -114 0 z"/>
        <rect x="285" y="250" width="46" height="240" rx="23"/>
      </g>
    </svg>
    <div class="name">Shap<span class="eat">Eat</span></div>
  </div>
</body></html>
