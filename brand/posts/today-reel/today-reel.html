<!doctype html>
<html lang="he" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=block"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #000;
      }
      body {
        font-family: "Heebo", sans-serif;
        direction: rtl;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
      }

      /* full-bleed gradient lives on a child, never the root */
      #bg {
        position: absolute;
        inset: 0;
        background: linear-gradient(160deg, #4f46e5 0%, #6d28d9 55%, #7c3aed 100%);
      }
      #bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 50% 22%,
          rgba(255, 255, 255, 0.16),
          rgba(255, 255, 255, 0) 60%
        );
      }

      .clip {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 120px 90px;
        text-align: center;
      }

      /* Scene 1 — hook */
      #s1-eyebrow {
        font-size: 52px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.72);
        letter-spacing: 1px;
      }
      #s1-title {
        font-size: 132px;
        font-weight: 900;
        line-height: 1.05;
        color: #ffffff;
        margin-top: 14px;
      }
      #s1-sub {
        font-size: 40px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.78);
        margin-top: 40px;
      }

      /* Scene 2 — the day, checked off */
      #s2 .stack {
        width: 100%;
        max-width: 860px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 44px;
      }
      #s2-cap {
        font-size: 56px;
        font-weight: 800;
        color: #ffffff;
      }
      #card {
        width: 100%;
        background: #ffffff;
        border-radius: 44px;
        box-shadow: 0 40px 90px rgba(30, 27, 75, 0.35);
        padding: 56px 52px 44px;
        text-align: right;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 30px;
        padding: 26px 4px;
        border-bottom: 2px solid #eef0f6;
      }
      .row:last-of-type {
        border-bottom: none;
      }
      .chk {
        flex: 0 0 auto;
        width: 70px;
        height: 70px;
        border-radius: 50%;
        border: 4px solid #d6dae6;
        background: #ffffff;
        display: grid;
        place-items: center;
      }
      .tick {
        font-size: 42px;
        font-weight: 900;
        color: #ffffff;
        opacity: 0;
        line-height: 1;
      }
      .row .label {
        flex: 1 1 auto;
        font-size: 46px;
        font-weight: 700;
        color: #1e1b4b;
      }
      .row .food {
        font-size: 34px;
        font-weight: 500;
        color: #8b90a6;
        margin-top: 4px;
      }
      .progress {
        margin-top: 40px;
        width: 100%;
        height: 22px;
        border-radius: 999px;
        background: #eef0f6;
        overflow: hidden;
      }
      #bar {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #6d28d9, #22c55e);
        transform-origin: right center;
      }

      /* Scene 3 — swap */
      #s3 .stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 36px;
      }
      #s3-icon {
        width: 200px;
        height: 200px;
        border-radius: 48px;
        background: rgba(255, 255, 255, 0.14);
        border: 3px solid rgba(255, 255, 255, 0.32);
        box-shadow: 0 24px 60px rgba(30, 27, 75, 0.3);
        display: grid;
        place-items: center;
      }
      #s3-icon svg {
        width: 116px;
        height: 116px;
      }
      #s3-text {
        font-size: 88px;
        font-weight: 900;
        color: #ffffff;
      }
      #s3-sub {
        font-size: 40px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.8);
      }

      /* Scene 4 — brand close */
      #s4 .stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }
      #s4-tagline {
        font-size: 80px;
        font-weight: 900;
        line-height: 1.1;
        color: #ffffff;
        max-width: 820px;
      }
      #s4-logo {
        margin-top: 18px;
        font-size: 96px;
        font-weight: 900;
        color: #ffffff;
        letter-spacing: -1px;
      }
      #s4-logo .dot {
        color: #34d399;
      }
      #s4-url {
        font-size: 44px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.85);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="12.7"
      data-width="1080"
      data-height="1920"
    >
      <div id="bg" class="clip" data-start="0" data-duration="12.7" data-track-index="0"></div>

      <!-- Scene 1 -->
      <section id="s1" class="clip" data-start="0" data-duration="2.9" data-track-index="1">
        <div>
          <div id="s1-eyebrow">קיבלת תפריט?</div>
          <div id="s1-title">זו רק<br />ההתחלה</div>
          <div id="s1-sub">המוצר האמיתי הוא היום שלך</div>
        </div>
      </section>

      <!-- Scene 2 -->
      <section id="s2" class="clip" data-start="2.9" data-duration="4.8" data-track-index="2">
        <div class="stack">
          <div id="s2-cap">מסמנים מה אכלת</div>
          <div id="card">
            <div class="row">
              <div class="chk" id="chk0"><span class="tick" id="tick0">&#10003;</span></div>
              <div>
                <div class="label">בוקר</div>
                <div class="food">חביתה וטוסט אבוקדו</div>
              </div>
            </div>
            <div class="row">
              <div class="chk" id="chk1"><span class="tick" id="tick1">&#10003;</span></div>
              <div>
                <div class="label">צהריים</div>
                <div class="food">חזה עוף עם אורז וירקות</div>
              </div>
            </div>
            <div class="row">
              <div class="chk" id="chk2"><span class="tick" id="tick2">&#10003;</span></div>
              <div>
                <div class="label">ביניים</div>
                <div class="food">יוגורט עם פרי</div>
              </div>
            </div>
            <div class="row">
              <div class="chk" id="chk3"><span class="tick" id="tick3">&#10003;</span></div>
              <div>
                <div class="label">ערב</div>
                <div class="food">סלט גדול עם טונה</div>
              </div>
            </div>
            <div class="progress"><span id="bar"></span></div>
          </div>
        </div>
      </section>

      <!-- Scene 3 -->
      <section id="s3" class="clip" data-start="7.7" data-duration="2.0" data-track-index="3">
        <div class="stack">
          <div id="s3-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="23 4 23 10 17 10"></polyline>
              <polyline points="1 20 1 14 7 14"></polyline>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
          </div>
          <div id="s3-text">לא מתאים? מחליפים</div>
          <div id="s3-sub">והיום מתאזן מעצמו</div>
        </div>
      </section>

      <!-- Scene 4 -->
      <section id="s4" class="clip" data-start="9.7" data-duration="3.0" data-track-index="4">
        <div class="stack">
          <div id="s4-tagline">היום שלך,<br />מסודר ומסומן</div>
          <div id="s4-logo">ShapEat<span class="dot">.</span></div>
          <div id="s4-url">shapeat.co.il&nbsp;&nbsp;·&nbsp;&nbsp;@shapeatapp</div>
        </div>
      </section>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Scene 1 — hook
      tl.from("#s1-eyebrow", { y: 40, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.25);
      tl.from("#s1-title", { y: 70, opacity: 0, duration: 0.9, ease: "power3.out" }, 0.5);
      tl.from("#s1-sub", { y: 30, opacity: 0, duration: 0.6, ease: "power2.out" }, 1.2);

      // Scene 2 — card in, rows check off, progress fills
      tl.from("#s2-cap", { y: -30, opacity: 0, duration: 0.55, ease: "power2.out" }, 3.0);
      tl.from(
        "#card",
        { y: 90, opacity: 0, scale: 0.96, duration: 0.8, ease: "power3.out" },
        3.15
      );

      const checkStart = 4.0;
      const step = 0.7;
      for (let i = 0; i < 4; i++) {
        const t = checkStart + i * step;
        tl.to(
          "#chk" + i,
          { backgroundColor: "#22c55e", borderColor: "#22c55e", duration: 0.25, overwrite: "auto" },
          t
        );
        tl.fromTo(
          "#tick" + i,
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.3, ease: "back.out(2.4)", overwrite: "auto" },
          t + 0.05
        );
      }
      // progress bar fills across the four checks
      tl.fromTo("#bar", { scaleX: 0 }, { scaleX: 1, duration: 2.4, ease: "power1.inOut" }, checkStart);

      // Scene 3 — swap
      tl.from(
        "#s3-icon",
        { rotation: -270, scale: 0.5, opacity: 0, duration: 0.75, ease: "back.out(1.5)" },
        7.85
      );
      tl.from("#s3-text", { y: 40, opacity: 0, duration: 0.55, ease: "power3.out" }, 8.15);
      tl.from("#s3-sub", { y: 24, opacity: 0, duration: 0.5, ease: "power2.out" }, 8.45);

      // Scene 4 — brand close
      tl.from("#s4-tagline", { y: 60, opacity: 0, duration: 0.7, ease: "power3.out" }, 9.85);
      tl.from("#s4-logo", { scale: 0.82, opacity: 0, duration: 0.6, ease: "back.out(1.5)" }, 10.25);
      tl.from("#s4-url", { y: 24, opacity: 0, duration: 0.5, ease: "power2.out" }, 10.75);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
