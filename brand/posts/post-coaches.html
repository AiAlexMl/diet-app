<!DOCTYPE html>
<!-- פוסט מאמנים לאינסטגרם 1080x1080. פתח בדפדפן → צלם את הכרטיס (.card) → שמור כ-PNG. -->
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{display:flex;align-items:center;justify-content:center;background:#333;font-family:'Heebo',sans-serif;min-height:100vh}
  .card{
    width:1080px;height:1080px;flex:0 0 auto;position:relative;overflow:hidden;
    background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);
    color:#fff;display:flex;flex-direction:column;justify-content:center;padding:0 100px;
  }
  .card::before,.card::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.06)}
  .card::before{width:620px;height:620px;top:-220px;left:-180px}
  .card::after{width:480px;height:480px;bottom:-200px;right:-120px}
  .logo{position:absolute;top:64px;right:100px;display:flex;align-items:center;gap:15px;z-index:2}
  .logo img{width:60px;height:60px;border-radius:15px;object-fit:cover;box-shadow:0 8px 24px rgba(0,0,0,.2)}
  .logo span{font-size:28px;font-weight:900;letter-spacing:-.5px}
  .inner{position:relative;z-index:1}
  .badge{display:inline-block;background:#fff;color:#5b3ee0;font-size:30px;font-weight:800;
    padding:10px 28px;border-radius:999px;margin-bottom:34px;box-shadow:0 8px 22px rgba(0,0,0,.18)}
  .h1{font-size:82px;font-weight:900;letter-spacing:-2px;line-height:1.06;margin-bottom:48px}
  .h1 .grad{opacity:.9}
  .list{display:flex;flex-direction:column;gap:24px}
  .row{display:flex;align-items:center;gap:22px;font-size:40px;font-weight:600}
  .row .ic{width:74px;height:74px;flex:0 0 auto;border-radius:18px;background:rgba(255,255,255,.16);
    display:flex;align-items:center;justify-content:center;font-size:40px}
  .url{position:absolute;bottom:64px;right:100px;font-size:30px;font-weight:700;opacity:.92;z-index:2}
  .handle{position:absolute;bottom:64px;left:100px;font-size:30px;font-weight:700;opacity:.92;z-index:2;direction:ltr}
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="../AVATAR-shapeat.png" alt="ShapEat"><span>ShapEat</span></div>
    <div class="inner">
      <div class="badge">מאמן/ה? 👋</div>
      <div class="h1">האפליקציה שלך.<br><span class="grad">המתאמנים שלך.</span></div>
      <div class="list">
        <div class="row"><div class="ic">🎨</div><div>ממותג בשמך</div></div>
        <div class="row"><div class="ic">🔥</div><div>מתאמנים שמתמידים</div></div>
        <div class="row"><div class="ic">📊</div><div>רואים מי נשמט, ומתערבים בזמן</div></div>
      </div>
    </div>
    <div class="url">shapeat.co.il/coaches</div>
    <div class="handle">@shapeatapp</div>
  </div>
</body>
</html>
