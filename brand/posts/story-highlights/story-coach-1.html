<!doctype html>
<html lang="he">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=block" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"Heebo",sans-serif; direction:rtl; }
  #shot {
    position:relative; width:1080px; height:1920px; overflow:hidden;
    background:linear-gradient(160deg,#4f46e5 0%,#6d28d9 55%,#7c3aed 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:230px 90px; text-align:center; color:#fff;
  }
  .brand { position:absolute; top:140px; right:0; left:0; font-size:38px; font-weight:900; letter-spacing:-1px; color:rgba(255,255,255,.9); }
  .brand .dot { color:#34d399; }
  .eyebrow { font-size:50px; font-weight:800; color:#c4b5fd; margin-bottom:20px; }
  h1 { font-size:118px; font-weight:900; line-height:1.05; }
  .sub { font-size:44px; font-weight:500; color:rgba(255,255,255,.88); margin-top:46px; line-height:1.45; max-width:840px; }
  .foot { position:absolute; bottom:150px; right:0; left:0; font-size:38px; font-weight:700; color:rgba(255,255,255,.8); }
</style>
</head>
<body>
  <div id="shot">
    <div class="brand">ShapEat<span class="dot">.</span></div>
    <div class="eyebrow">מאמן/ה?</div>
    <h1>האפליקציה שלך,<br />המותג שלך</h1>
    <div class="sub">תפריט יומי אישי לכל מתאמן, ממותג בשמך, פלוס דשבורד שמראה מי מתמיד. בלי לבנות תפריטים ידנית.</div>
    <div class="foot">ShapEat למאמנים</div>
  </div>
</body>
</html>
