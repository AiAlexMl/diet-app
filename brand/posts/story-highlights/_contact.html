<!doctype html>
<html lang="he">
<head><meta charset="UTF-8" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  #shot { display:flex; gap:24px; padding:30px; background:#111; align-items:flex-start; width:max-content; font-family:sans-serif; }
  figure { width:340px; }
  img { width:340px; height:auto; display:block; border-radius:12px; }
  figcaption { color:#fff; font-size:22px; text-align:center; margin-top:10px; direction:rtl; }
</style>
</head>
<body>
  <div id="shot">
    <figure><img src="story-product.png" /><figcaption>story-product</figcaption></figure>
    <figure><img src="story-coach-1.png" /><figcaption>story-coach-1</figcaption></figure>
    <figure><img src="story-coach-2.png" /><figcaption>story-coach-2</figcaption></figure>
    <figure><img src="cover-product.png" /><figcaption>cover-product</figcaption></figure>
    <figure><img src="cover-coach.png" /><figcaption>cover-coach</figcaption></figure>
  </div>
</body>
</html>
