<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin:0; padding:0; }
  body { width:1024px; height:1024px; overflow:hidden; }
  .bg {
    width:1024px; height:1024px;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Segoe UI', Arial, sans-serif;
  }
  .l1 { color:#fff; font-size:230px; font-weight:800; line-height:0.95; letter-spacing:-6px; }
  .l2 { color:#a7f3d0; font-size:230px; font-weight:800; line-height:0.95; letter-spacing:-6px; }
</style></head>
<body>
  <div class="bg">
    <div class="l1">Shap</div>
    <div class="l2">Eat</div>
  </div>
</body></html>
